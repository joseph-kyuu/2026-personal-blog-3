<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nelson的部落格</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="./all.css" />
  </head>
  <body>
    <header>
      <!-- 導覽列 -->
      <nav
        class="container px-0 py-6 d-flex justify-content-between align-items-center"
      >
        <!-- 品牌標誌 -->
        <img src="./img/device-pc.svg" alt="品牌標誌" title="品牌標誌" />
        <!-- 主選單 -->
        <ul class="list-unstyled d-flex align-items-center">
          <li>
            <a class="fs-xxx-smal fw-medium py-1 px-6 me-4 nav-btn" href="＃"
              >服務項目</a
            >
          </li>
          <li>
            <a class="fs-xxx-smal fw-medium py-1 px-6 me-4 nav-btn" href="＃"
              >專案作品</a
            >
          </li>
          <li>
            <a class="fs-xxx-smal fw-medium py-1 px-6 me-4 nav-btn" href="＃"
              >部落格</a
            >
          </li>
          <li>
            <a class="fs-xxx-smal fw-medium py-1 px-6 nav-btn" href="＃"
              >與我聯絡</a
            >
          </li>
        </ul>
      </nav>
      <!-- hero -->
      <section class="position-relative">
        <!-- 插圖 -->
        <div class="position-absolute top-56 start-86">
          <img src="./img/index_decora_3.png" alt="" />
        </div>
        <div class="position-absolute top-120 start-224">
          <img src="./img/index_decora_4.png" alt="" />
        </div>
        <div class="position-absolute bottom-192 start-704 max-w-80">
          <img src="./img/index_decora_3.png" alt="" />
        </div>
        <div class="position-absolute bottom-84 start-524">
          <img src="./img/index_decora_5.png" alt="" />
        </div>
        <div class="position-absolute top-206 end-142">
          <img src="./img/index_decora_3.png" alt="" />
        </div>
        <div class="position-absolute top-96 start-784">
          <img src="./img/index_decora_1.png" alt="" />
        </div>
        <div class="position-absolute bottom-88 end-232">
          <img src="./img/index_decora_2.png" alt="" />
        </div>
        <div class="container px-0 d-flex justify-content-between">
          <!-- 主副標題、CTA -->
          <div class="d-flex flex-column justify-content-center">
            <div class="mb-7">
              <!-- 主標題 -->
              <div class="mb-4">
                <h1 class="fs-xxx-large fw-bold">
                  Hello<br />
                  I'm Nelson
                </h1>
              </div>
              <!-- 副標題 -->
              <div class="mb-1">
                <h2 class="fs-xxx-small lh-1p5">
                  我是一個擁有 10 年經驗的 UIUX 設計師 和 前端工程師
                </h2>
              </div>
              <h2 class="fs-xxx-small lh-1p5">
                喜歡把美學和程式結合，打造一個又一個精美的網頁設計！
              </h2>
            </div>

            <!-- CTA -->
            <div>
              <button
                type="button"
                class="btn btn-normal btn-filled-neutral-700 me-4"
              >
                與我聯絡
              </button>
              <button
                type="button"
                class="btn btn-normal btn-outline-neutral-700"
              >
                我的履歷
              </button>
            </div>
          </div>
          <!-- 圖片 -->
          <img
            src="./img/index_person.png"
            alt="Nelson照片"
            title="Nelson照片"
          />
        </div>
      </section>
    </header>
    <script src="./all.js"></script>
  </body>
</html>
